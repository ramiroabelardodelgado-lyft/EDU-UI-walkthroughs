<html>
<style>
/* ── Lyft Product Language — exact tokens from Core UI Components ── */
:root {
  /* Surfaces */
  --c-interactive:   #820076;   /* CORE_UI_COLORS.surfaceInteractive  */
  --c-interactive-h: #66035b;   /* LPL Pressed Surface Interactive    */
  --c-interactive-d: #c490bf;   /* disabled ~50% lightened            */
  --c-negative:      #c81534;   /* CORE_UI_COLORS.surfaceNegative     */
  --c-negative-h:    #98122c;   /* LPL Pressed Surface Negative       */
  /* Text */
  --c-text:          #1d0c17;   /* CORE_UI_COLORS.textPrimary         */
  --c-text-inv:      #ffffff;   /* CORE_UI_COLORS.textPrimaryInverse  */
  --c-muted:         #7a6470;   /* warm muted, derived                */
  --c-ok:            #00823c;
  /* Surfaces */
  --c-bg:            #f0ede9;   /* warm off-white page bg             */
  --c-surface:       #ffffff;
  --c-sec:           #e5e1db;   /* secondary btn bg (surfaceSecondary resolved) */
  --c-sec-h:         #dad5ce;   /* pressed secondary                  */
  --c-border:        #dbd6d1;
  /* Shape */
  --r-pill:  100px;
  --r-sm:    8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Rebel Sans Text VF", "SF Pro Text", -apple-system, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  overflow-y: auto;
  overflow-x: hidden;
  font-size: 11px;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px 9px;
  background: var(--c-text);   /* #1d0c17 — near-black warm dark */
  position: sticky;
  top: 0;
  z-index: 10;
}
#header svg { width: 15px; flex-shrink: 0; }
#header h1 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.01em;
  color: #fff;
  flex: 1;
}
#version { font-size: 9px; color: rgba(255,255,255,0.38); }

/* ── Sections ── */
.section {
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  padding: 8px 0 6px;
}
.section-label {
  font-size: 8.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--c-interactive);
  padding: 0 12px 5px;
}

/* ── Frame rows ── */
.frame-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 12px;
  font-size: 11px;
}
.frame-row.ok   .dot { color: var(--c-ok); }
.frame-row.warn .dot { color: var(--c-negative); }
.dot { font-size: 11px; flex-shrink: 0; }
.frame-name { font-weight: 600; min-width: 22px; }
.frame-dims { color: var(--c-muted); flex: 1; font-variant-numeric: tabular-nums; }
.frame-row.warn .frame-dims { color: var(--c-negative); }

.scale-btn {
  font-size: 9.5px;
  font-weight: 600;
  font-family: inherit;
  padding: 2px 9px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--c-negative);
  color: var(--c-negative);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
}
.scale-btn:hover { background: rgba(200,21,52,0.07); }
.scale-btn:active { background: rgba(152,18,44,0.12); }

/* ── Hint & error summary ── */
#hint {
  font-size: 9.5px;
  color: var(--c-muted);
  padding: 2px 12px 4px;
  display: none;
}
#error-summary {
  font-size: 9.5px;
  font-weight: 600;
  color: var(--c-negative);
  padding: 2px 12px 2px;
  display: none;
}

/* ── Scale-all button — secondary style ── */
#btn-scale-all {
  width: 100%;
  padding: 7px 0;
  border-radius: var(--r-pill);
  border: none;
  background: var(--c-sec);
  font-size: 10.5px;
  font-weight: 600;
  font-family: inherit;
  color: var(--c-text);
  cursor: pointer;
}
#btn-scale-all:hover  { background: var(--c-sec-h); }
#btn-scale-all:active { background: #cec8c1; }

/* ── Selection info ── */
#selection-info {
  font-size: 10.5px;
  color: var(--c-text);
  padding: 4px 12px 2px;
  min-height: 20px;
  font-weight: 500;
}
#selection-info.empty { color: var(--c-muted); font-style: italic; font-weight: 400; }
#selection-info.edu   { color: var(--c-negative); }

/* ── Padding row ── */
#padding-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px 6px;
  font-size: 10.5px;
  color: var(--c-muted);
}
#padding-input {
  width: 44px;
  padding: 3px 6px;
  border: 1.5px solid var(--c-border);
  border-radius: var(--r-sm);
  font-size: 11px;
  font-family: inherit;
  text-align: center;
  color: var(--c-text);
  background: var(--c-bg);
}
#padding-input:focus { outline: none; border-color: var(--c-interactive); }

/* ── EDU component buttons ── */
#edu-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  padding: 0 12px 6px;
}
.edu-btn {
  padding: 6px 4px;
  border-radius: var(--r-sm);
  border: none;
  background: var(--c-sec);
  font-size: 10px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  color: var(--c-text);
  line-height: 1.3;
}
.edu-btn:hover  { background: var(--c-sec-h); }
.edu-btn:active { background: #cec8c1; }
.edu-btn.full {
  grid-column: 1 / -1;
  background: var(--c-interactive);
  color: var(--c-text-inv);
  font-weight: 700;
  border-radius: var(--r-pill);
  padding: 8px 4px;
  font-size: 10.5px;
}
.edu-btn.full:hover  { background: var(--c-interactive-h); }
.edu-btn.full:active { background: #500050; }

/* ── Status line ── */
#status-line {
  font-size: 9.5px;
  padding: 4px 12px 4px;
  min-height: 20px;
  color: var(--c-muted);
}
#status-line.error { color: var(--c-negative); font-weight: 600; }
#status-line.ok    { color: var(--c-ok);       font-weight: 500; }

/* ── Footer ── */
#footer {
  display: flex;
  gap: 8px;
  padding: 8px 12px 10px;
  border-top: 1px solid var(--c-border);
  background: var(--c-surface);
  position: sticky;
  bottom: 0;
  z-index: 10;
}
#btn-close {
  flex: 0 0 auto;
  padding: 7px 16px;
  border-radius: var(--r-pill);
  border: none;
  background: var(--c-sec);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  color: var(--c-text);
  cursor: pointer;
}
#btn-close:hover  { background: var(--c-sec-h); }
#btn-close:active { background: #cec8c1; }

#btn-export {
  flex: 1;
  padding: 7px 0;
  border-radius: var(--r-pill);
  border: none;
  background: var(--c-interactive);
  font-size: 11px;
  font-weight: 700;
  font-family: inherit;
  color: var(--c-text-inv);
  cursor: pointer;
  letter-spacing: 0.01em;
}
#btn-export:hover    { background: var(--c-interactive-h); }
#btn-export:active   { background: #500050; }
#btn-export:disabled {
  background: var(--c-interactive-d);
  cursor: not-allowed;
  color: var(--c-text-inv);
}

/* ── Render section ── */
#render-section .section-label { display: flex; align-items: center; gap: 6px; }
#server-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--c-muted); flex-shrink: 0;
  transition: background 200ms;
}
#server-status-dot.online { background: var(--c-ok); }
#server-status-text {
  margin-left: auto;
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--c-muted);
  text-transform: none;
}
#server-status-text.online { color: var(--c-ok); }

#render-hint {
  font-size: 9.5px;
  color: var(--c-muted);
  padding: 2px 12px 6px;
}
#render-hint code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  background: var(--c-bg);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 9.5px;
}

#render-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  padding: 0 12px 6px;
}
.render-btn {
  padding: 8px 4px;
  border-radius: var(--r-pill);
  border: none;
  background: var(--c-interactive);
  font-size: 10.5px;
  font-weight: 700;
  font-family: inherit;
  color: var(--c-text-inv);
  cursor: pointer;
  text-align: center;
  letter-spacing: 0.01em;
}
.render-btn:hover  { background: var(--c-interactive-h); }
.render-btn:active { background: #500050; }
.render-btn:disabled {
  background: var(--c-interactive-d);
  cursor: not-allowed;
}

#render-status {
  font-size: 9.5px;
  padding: 4px 12px 4px;
  min-height: 16px;
  color: var(--c-muted);
}
#render-status.error { color: var(--c-negative); font-weight: 600; }
#render-status.ok    { color: var(--c-ok); font-weight: 500; }

#preview-area {
  padding: 6px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: stretch;
}
#preview-video {
  width: 100%;
  max-height: 340px;
  background: #000;
  border-radius: var(--r-sm);
  display: block;
}
#preview-meta {
  font-size: 9.5px;
  color: var(--c-muted);
  font-variant-numeric: tabular-nums;
  text-align: center;
}
#btn-save-mp4 {
  padding: 7px 0;
  border-radius: var(--r-pill);
  border: none;
  background: var(--c-sec);
  font-size: 10.5px;
  font-weight: 600;
  font-family: inherit;
  color: var(--c-text);
  cursor: pointer;
}
#btn-save-mp4:hover  { background: var(--c-sec-h); }
#btn-save-mp4:active { background: #cec8c1; }

/* ── Section name toggle ── */
#section-name-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px 8px;
  background: var(--c-surface);
  border-top: 1px solid var(--c-border);
}
#section-name-row label {
  font-size: 10px;
  color: var(--c-muted);
  cursor: pointer;
  user-select: none;
  flex: 1;
}
#section-name-row input[type="checkbox"] {
  accent-color: var(--c-interactive);
  width: 12px;
  height: 12px;
  cursor: pointer;
  flex-shrink: 0;
}
</style>

<head><script></script></head>
<body>

<!-- ── Header ── -->
<div id="header">
  <svg viewBox="0 0 199 141" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(-112,-79)" fill="#FF00B7">

    </g>
  </svg>
  <h1>UI Walkthroughs</h1>
  <span id="version"></span>
</div>

<!-- ── Frame sizes section ── -->
<div class="section" id="frames-section">
  <div class="section-label">Frames</div>
  <div id="frame-list"></div>
  <div id="hint">Default size: 393 × 852 &nbsp;·&nbsp; unless scroll animation</div>
  <div id="error-summary"></div>
  <div style="padding: 4px 12px 8px">
    <button id="btn-scale-all">Scale all → 393</button>
  </div>
</div>

<!-- ── Add EDU components section ── -->
<div class="section" id="components-section">
  <div class="section-label">Add EDU Component</div>
  <div id="selection-info" class="empty">No element selected</div>

  <div id="padding-row">
    <span>Padding</span>
    <input type="number" id="padding-input" value="2" min="0" max="200">
    <span>px</span>
  </div>

  <div id="edu-buttons">
    <button class="edu-btn full" data-type="step-click">
      HL Button + Step + Click
    </button>
    <button class="edu-btn full" data-type="step-click-area" style="background:var(--c-interactive-h)">
      HL Area + Step + Click
    </button>
    <button class="edu-btn" data-type="highlight">
      Highlight
    </button>
    <button class="edu-btn" data-type="highlight-button">
      HL Button
    </button>
    <button class="edu-btn" data-type="click">
      Click
    </button>
    <button class="edu-btn" data-type="swipe">
      Swipe
    </button>
    <button class="edu-btn" data-type="scroll">
      Scroll
    </button>
    <button class="edu-btn" data-type="drag">
      Drag
    </button>
  </div>

  <div id="status-line"></div>
</div>

<!-- ── Render section (local server) ── -->
<div class="section" id="render-section">
  <div class="section-label">
    <span id="server-status-dot"></span>
    <span>Render</span>
    <span id="server-status-text">not connected</span>
  </div>
  <div id="render-hint">Renderer not running — start with <code>npm run server</code></div>
  <div id="render-buttons">
    <button class="render-btn" id="btn-render-full" disabled>Render MP4</button>
    <button class="render-btn" id="btn-render-compressed" disabled>Render 480p</button>
  </div>
  <div id="render-status"></div>
  <div id="preview-area" hidden>
    <video id="preview-video" controls playsinline></video>
    <div id="preview-meta"></div>
    <button id="btn-save-mp4">Save MP4</button>
  </div>
</div>

<!-- ── Section name toggle ── -->
<div id="section-name-row">
  <input type="checkbox" id="chk-section-name" checked>
  <label for="chk-section-name">Use section name for export file</label>
</div>

<!-- ── Footer ── -->
<div id="footer">
  <button id="btn-close">Close</button>
  <button id="btn-export">Export</button>
</div>

</body>
</html>
